apiVersion: karpenter.exoscale.com/v1
kind: ExoscaleNodeClass
metadata:
  name: gpu-nvidia
spec:
  # imageTemplateSelector with nvidia variant for GPU workloads
  # Omit 'version' or use imageTemplateSelector: {variant: "nvidia"} 
  # to auto-detect control plane version
  imageTemplateSelector:
    version: "1.34.1"
    variant: "nvidia"
  
  # Minimal disk for GPU nodes
  diskSize: 50
  
  securityGroupSelectorTerms: []
  # - id: "123e4567-e89b-12d3-a456-426614174000"
  # - name: "my-security-group"
  
  # Anti-affinity groups for spreading GPU nodes across hosts
  antiAffinityGroupSelectorTerms: []
  # - id: "123e4567-e89b-12d3-a456-426614174000"
  # - name: "my-anti-affinity-group"
  
  privateNetworkSelectorTerms: []
  # - id: "123e4567-e89b-12d3-a456-426614174000"
  # - name: "my-private-network"

  # GPU-specific labels
  nodeLabels:
    workload-type: "gpu"
    gpu-enabled: "true"
    environment: "production"
    "nvidia.com/gpu.present": "true"
  
  # GPU-specific taints to ensure only GPU workloads are scheduled
  nodeTaints:
    - key: "nvidia.com/gpu"
      value: "true"
      effect: "NoSchedule"
