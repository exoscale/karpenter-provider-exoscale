apiVersion: apps/v1
kind: Deployment
metadata:
  name: karpenter-exoscale
  labels:
    app: karpenter-exoscale
spec:
  replicas: 2
  selector:
    matchLabels:
      app: karpenter-exoscale
  template:
    metadata:
      labels:
        app: karpenter-exoscale
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: karpenter-exoscale
                topologyKey: "kubernetes.io/hostname"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1997
        fsGroup: 2000
      containers:
        - name: karpenter
          image: docker.io/exoscale/karpenter-exoscale:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
            - containerPort: 8081
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
