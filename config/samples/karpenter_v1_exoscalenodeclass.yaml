apiVersion: karpenter.exoscale.com/v1
kind: ExoscaleNodeClass
metadata:
  name: default
spec:
  # Template ID for the instance (required)
  templateID: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
  
  # Disk size in GB (default: 50)
  diskSize: 100
  
  # Security groups (optional)
  securityGroups:
    - "11111111-2222-3333-4444-555555555555"
  
  # Anti-affinity groups (optional, max 8)
  antiAffinityGroups:
    - "aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee"
  
  # Private networks (optional)
  privateNetworks:
    - "99999999-8888-7777-6666-555555555555"
  
  # Image garbage collection settings
  imageGCHighThresholdPercent: 85
  imageGCLowThresholdPercent: 80
  imageMinimumGCAge: "5m"
  
  # Resource reservations for system components
  kubeReserved:
    cpu: "200m"
    memory: "300Mi"
    ephemeralStorage: "1Gi"
  
  systemReserved:
    cpu: "100m"
    memory: "200Mi"
    ephemeralStorage: "500Mi"
  
  # Node labels (optional)
  nodeLabels:
    environment: "production"
    team: "platform"
  
  # Node taints (optional)
  nodeTaints:
    - key: "dedicated"
      value: "gpu"
      effect: "NoSchedule"