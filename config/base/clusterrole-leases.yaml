kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: karpenter-leases
  labels:
    kubernetes.io/app: karpenter
rules:
  - apiGroups:
      - "coordination.k8s.io"
    resources:
      - "leases"
    verbs:
      - "get"
      - "list"
      - "watch"
      - "update"
      - "delete"
