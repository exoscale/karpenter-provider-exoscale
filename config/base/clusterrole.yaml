---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: karpenter
  labels:
    kubernetes.io/app: karpenter
rules:
  # Source: https://github.com/aws/karpenter-provider-aws/blob/v0.35.2/charts/karpenter/templates/clusterrole-core.yaml
  # Read
  - apiGroups: ["karpenter.sh"]
    resources:
      ["nodepools", "nodepools/status", "nodeclaims", "nodeclaims/status"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      [
        "pods",
        "nodes",
        "persistentvolumes",
        "persistentvolumeclaims",
        "replicationcontrollers",
        "namespaces",
        "services",
        "configmaps",
      ]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "csinodes"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["apps"]
    resources: ["daemonsets", "deployments", "replicasets", "statefulsets"]
    verbs: ["list", "watch"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources:
      ["validatingwebhookconfigurations", "mutatingwebhookconfigurations"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  # Write
  - apiGroups: ["karpenter.sh"]
    resources: ["nodeclaims", "nodeclaims/status"]
    verbs: ["create", "delete", "update", "patch"]
  - apiGroups: ["karpenter.sh"]
    resources: ["nodepools", "nodepools/status"]
    verbs: ["update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["create", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["validatingwebhookconfigurations"]
    verbs: ["update"]
    resourceNames:
      [
        "validation.webhook.karpenter.sh",
        "validation.webhook.config.karpenter.sh",
      ]
